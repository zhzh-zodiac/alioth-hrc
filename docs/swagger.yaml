basePath: /api/v1
definitions:
  alioth-hrc_internal_model.Contact:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      relation_note:
        type: string
      remark:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  alioth-hrc_internal_model.GiftCategory:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_system:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  alioth-hrc_internal_model.GiftDirection:
    enum:
    - give
    - receive
    type: string
    x-enum-varnames:
    - DirectionGive
    - DirectionReceive
  alioth-hrc_internal_model.GiftRecord:
    properties:
      amount_cents:
        type: integer
      category_id:
        type: integer
      contact_id:
        type: integer
      created_at:
        type: string
      direction:
        $ref: '#/definitions/alioth-hrc_internal_model.GiftDirection'
      id:
        type: integer
      ledger_id:
        type: integer
      note:
        type: string
      occurred_on:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  alioth-hrc_internal_model.Ledger:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_default:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  alioth-hrc_internal_service.ContactCreate:
    properties:
      name:
        maxLength: 200
        type: string
      relation_note:
        maxLength: 200
        type: string
      remark:
        maxLength: 500
        type: string
    required:
    - name
    type: object
  alioth-hrc_internal_service.ContactStatRow:
    properties:
      balance_cents:
        type: integer
      contact_id:
        type: integer
      last_occurred_on:
        type: string
      total_give_cents:
        type: integer
      total_receive_cents:
        type: integer
    type: object
  alioth-hrc_internal_service.ContactUpdate:
    properties:
      name:
        maxLength: 200
        type: string
      relation_note:
        maxLength: 200
        type: string
      remark:
        maxLength: 500
        type: string
    required:
    - name
    type: object
  alioth-hrc_internal_service.GiftCategoryCreate:
    properties:
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  alioth-hrc_internal_service.GiftRecordCreate:
    properties:
      amount_cents:
        minimum: 1
        type: integer
      category_id:
        type: integer
      contact_id:
        type: integer
      direction:
        enum:
        - give
        - receive
        type: string
      ledger_id:
        type: integer
      note:
        maxLength: 1000
        type: string
      occurred_on:
        description: YYYY-MM-DD
        type: string
    required:
    - amount_cents
    - category_id
    - contact_id
    - direction
    - ledger_id
    - occurred_on
    type: object
  alioth-hrc_internal_service.GiftRecordUpdate:
    properties:
      amount_cents:
        minimum: 1
        type: integer
      category_id:
        type: integer
      contact_id:
        type: integer
      direction:
        enum:
        - give
        - receive
        type: string
      ledger_id:
        type: integer
      note:
        maxLength: 1000
        type: string
      occurred_on:
        type: string
    required:
    - amount_cents
    - category_id
    - contact_id
    - direction
    - ledger_id
    - occurred_on
    type: object
  alioth-hrc_internal_service.LedgerCreate:
    properties:
      name:
        maxLength: 200
        type: string
    required:
    - name
    type: object
  alioth-hrc_internal_service.LedgerUpdate:
    properties:
      name:
        maxLength: 200
        type: string
    required:
    - name
    type: object
  alioth-hrc_internal_service.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  alioth-hrc_internal_service.LogoutInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  alioth-hrc_internal_service.MonthlyStatRow:
    properties:
      give_cents:
        type: integer
      receive_cents:
        type: integer
      year_month:
        type: string
    type: object
  alioth-hrc_internal_service.RefreshInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  alioth-hrc_internal_service.RegisterInput:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  alioth-hrc_internal_service.SummaryResult:
    properties:
      balance_cents:
        type: integer
      ledger_id:
        type: integer
      monthly:
        items:
          $ref: '#/definitions/alioth-hrc_internal_service.MonthlyStatRow'
        type: array
      total_give_cents:
        type: integer
      total_receive_cents:
        type: integer
      year:
        type: integer
    type: object
  alioth-hrc_internal_service.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  internal_handler.ContactListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/alioth-hrc_internal_model.Contact'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  internal_handler.ErrorJSON:
    properties:
      error:
        type: string
    type: object
  internal_handler.GiftCategoryListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/alioth-hrc_internal_model.GiftCategory'
        type: array
    type: object
  internal_handler.GiftRecordListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/alioth-hrc_internal_model.GiftRecord'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  internal_handler.LedgerListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/alioth-hrc_internal_model.Ledger'
        type: array
    type: object
  internal_handler.OKStatus:
    properties:
      status:
        type: string
    type: object
  internal_handler.RegisterResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  internal_handler.ReminderListResponse:
    properties:
      hint:
        type: string
      items:
        items: {}
        type: array
    type: object
  internal_handler.StatsContactsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/alioth-hrc_internal_service.ContactStatRow'
        type: array
    type: object
info:
  contact: {}
  description: 人情往来记账后端：认证、联系人、账本、礼金分类与流水、统计等。
  title: alioth-hrc API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/alioth-hrc_internal_service.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/alioth-hrc_internal_service.TokenPair'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
      summary: 登录
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: 刷新令牌
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/alioth-hrc_internal_service.LogoutInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.OKStatus'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
      summary: 登出
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: 刷新令牌
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/alioth-hrc_internal_service.RefreshInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/alioth-hrc_internal_service.TokenPair'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "401":
