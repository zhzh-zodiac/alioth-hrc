      summary: 刷新令牌
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 创建账号并自动创建默认账本；成功后返回用户基本信息。
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/alioth-hrc_internal_service.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
      summary: 用户注册
      tags:
      - auth
  /contacts:
    get:
      parameters:
      - description: 按姓名/关系模糊搜索
        in: query
        name: q
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.ContactListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
      security:
      - BearerAuth: []
      summary: 联系人列表
      tags:
      - contacts
    post:
      consumes:
      - application/json
      parameters:
      - description: 联系人
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/alioth-hrc_internal_service.ContactCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/alioth-hrc_internal_model.Contact'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "401":
