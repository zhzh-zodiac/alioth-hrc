        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
      security:
      - BearerAuth: []
      summary: 删除联系人
      tags:
      - contacts
    get:
      parameters:
      - description: 联系人 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/alioth-hrc_internal_model.Contact'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorJSON'
      security:
      - BearerAuth: []
      summary: 联系人详情
      tags:
      - contacts
    put:
      consumes:
      - application/json
      parameters:
      - description: 联系人 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 联系人
        in: body
        name: body
        required: true
